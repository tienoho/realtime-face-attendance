version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: face-attendance-db
    restart: always
    environment:
      POSTGRES_USER: faceuser
      POSTGRES_PASSWORD: facepassword
      POSTGRES_DB: face_attendance
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgres_schema.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - face-attendance-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faceuser -d face_attendance"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (Flask + Socket.IO)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: face-attendance-api
    restart: always
    environment:
      - DB_HOST=db
      - DB_USER=faceuser
      - DB_PASSWORD=facepassword
      - DB_NAME=face_attendance
      - DB_TYPE=postgresql
      - DB_PORT=5432
      - SECRET_KEY=your-secret-key-change-in-production
      - PORT=5001
      - UPLOAD_FOLDER=/app/TrainingImage
      - MODEL_PATH=/app/model/Trainer.yml
      - CASCADE_PATH=/app/model/Haarcascade.xml
      - LABEL_MAP_PATH=/app/model/label_map.json
      - CORS_ORIGINS=http://localhost,http://localhost:80,http://localhost:3000,http://localhost:5173
      - REDIS_URL=memory://
    ports:
      - "5001:5001"
    volumes:
      - ./TrainingImage:/app/TrainingImage
      - ./model:/app/model
      - ./logs:/app/logs
      - ./face_recognition:/app/face_recognition
    depends_on:
      db:
        condition: service_healthy
    networks:
      - face-attendance-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5001/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (React + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: face-attendance-web
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - face-attendance-network

volumes:
  postgres_data:

networks:
  face-attendance-network:
    driver: bridge
